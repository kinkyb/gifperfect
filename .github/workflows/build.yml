name: Build GIF Perfect

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install customtkinter static-ffmpeg pyinstaller pillow

      - name: Download static ffmpeg
        run: python -c "import static_ffmpeg; static_ffmpeg.add_paths()"

      - name: Generate icon
        run: python generate_icon.py

      - name: Build .app
        run: python -m PyInstaller gifperfect.spec --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "GIF Perfect" \
            --volicon "icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "GifPerfect.app" 150 180 \
            --hide-extension "GifPerfect.app" \
            --app-drop-link 450 180 \
            --no-internet-enable \
            "dist/GifPerfect-mac.dmg" \
            "dist/GifPerfect.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: GifPerfect-mac
          path: dist/GifPerfect-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install customtkinter static-ffmpeg pyinstaller pillow

      - name: Download static ffmpeg
        run: python -c "import static_ffmpeg; static_ffmpeg.add_paths()"

      - name: Generate icon
        run: python generate_icon.py

      - name: Build .exe
        run: python -m PyInstaller gifperfect.spec --noconfirm

      - name: Zip output
        run: Compress-Archive -Path dist\GifPerfect\* -DestinationPath dist\GifPerfect-windows.zip

      - name: Copy ffmpeg into bundle
        shell: python
        run: |
          import static_ffmpeg, shutil, os
          static_ffmpeg.add_paths()
          ff = shutil.which('ffmpeg')
          fp = shutil.which('ffprobe')
          print(f'ffmpeg source: {ff}')
          print(f'ffprobe source: {fp}')
          # PyInstaller 6.x puts deps in _internal/, older puts them next to exe
          for dest_dir in [r'dist\GifPerfect\_internal', r'dist\GifPerfect']:
              if os.path.isdir(dest_dir):
                  if ff:
                      shutil.copy(ff, os.path.join(dest_dir, 'ffmpeg.exe'))
                      print(f'Copied ffmpeg.exe to {dest_dir}')
                  if fp:
                      shutil.copy(fp, os.path.join(dest_dir, 'ffprobe.exe'))
                      print(f'Copied ffprobe.exe to {dest_dir}')

      - name: Verify ffmpeg bundled
        run: |
          Write-Host "=== dist\GifPerfect (recursive ffmpeg search) ==="
          Get-ChildItem dist\GifPerfect -Recurse | Where-Object { $_.Name -like "ffmpeg*" } | Select-Object FullName, Length | Format-Table
          $found = (Test-Path "dist\GifPerfect\ffmpeg.exe") -or (Test-Path "dist\GifPerfect\_internal\ffmpeg.exe")
          if (-not $found) {
            Write-Error "FATAL: ffmpeg.exe not found anywhere in bundle!"
            exit 1
          }
          Write-Host "ffmpeg.exe confirmed present in bundle"

      - name: Smoke test — launch and exit
        run: |
          Start-Process -FilePath "dist\GifPerfect\GifPerfect.exe" -PassThru | Tee-Object -Variable proc
          Start-Sleep -Seconds 6
          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force
            Write-Host "App launched and was running after 6s — OK"
          } else {
            Write-Error "App exited immediately (crash on startup)"
            exit 1
          }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GifPerfect-windows
          path: dist/GifPerfect-windows.zip
